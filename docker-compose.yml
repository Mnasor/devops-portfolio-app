services:
  # 1. تطبيقنا (Flask)
  web:
    image: mansour1998/portfolio-app:latest
    container_name: portfolio-web
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy    # <-- عدلنا هذا السطر: لن يعمل التطبيق حتى تكون القاعدة "بصحة جيدة"
    # فحص نبض التطبيق
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. قاعدة البيانات (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: portfolio-postgres
    restart: always
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: portfolio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # فحص نبض قاعدة البيانات
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. روبوت التحديث الآلي (Watchtower)
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 portfolio-web
  # 4. الحاصد (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - web

  # 5. الرسام (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
